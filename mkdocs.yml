site_name: DeckUI
site_description: A high-level, asyncio-native Python library for Elgato Stream Deck devices.
repo_url: https://github.com/graphras-com/DeckUI

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Guides:
      - Creating DUI Packages: guides/creating-dui-packages.md
  - API Reference:
      - Runtime: reference/runtime.md
      - UI: reference/ui.md
      - DSUI: reference/dsui.md
      - Render: reference/render.md
      - Tools: reference/tools.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: numpy
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            show_root_heading: true
            show_root_full_path: false
