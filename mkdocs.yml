site_name: DeUX
site_description: A high-level, asyncio-native Python library for Elgato Stream Deck devices.
repo_url: https://github.com/graphras-com/DeUX

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Guides:
      - DUI Repository & Built-in Packages: guides/dui-repository.md
      - Creating DUI Packages: guides/creating-dui-packages.md
      - Theming: guides/theming.md
      - Error Handling: guides/error-handling.md
      - Full-Screen Images: guides/full-screen-images.md
      - CLI Tools: guides/cli-tools.md
  - Example: example.md
  - Style Guide: STYLE.md
  - API Reference: reference/

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_diagrams.py
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - mkdocstrings:
      handlers:
        python:
          paths: ["src"]
          options:
            docstring_style: numpy
            show_source: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            show_root_heading: true
            show_root_full_path: false

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
