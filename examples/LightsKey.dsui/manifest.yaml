name: LightsKey
type: Key
version: 1
layout: layout.svg

bindings:
  lights:
    type: toggle
    node_on: lights_on
    node_off: lights_off
    default: false

  label:
    type: text
    node: label
    default: "Lights"

  indicator_color:
    type: color
    node: indicator
    attribute: fill
    default: "#333333"

events:
  - name: toggle
    source: key_press_release
    max_duration_ms: 300
