name: PowerKey
type: Key
version: 1
layout: layout.svg

bindings:
  label:
    type: text
    node: label
    default: "Power"

  ring_color:
    type: color
    node: ring
    attribute: stroke
    default: "#444444"

  line_color:
    type: color
    node: power_line
    attribute: stroke
    default: "#444444"

  indicator_color:
    type: color
    node: indicator
    attribute: fill
    default: "#333333"

events:
  - name: activate
    source: key_press_release
    max_duration_ms: 300

  - name: long_hold
    source: key_press
