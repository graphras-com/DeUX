name: BrightnessSlider
type: TouchStripCard
version: 1
layout: layout.svg

bindings:
  label:
    type: text
    node: brightness_label
    default: "Brightness"

  value_text:
    type: text
    node: brightness_value_text
    default: "50%"

  brightness:
    type: slider
    node: brightness_indicator
    default: 0.5
    direction: horizontal
    min_pos: 1.5
    max_pos: 183.5

events:
  - name: brightness_up
    source: encoder_turn
    direction: right

  - name: brightness_down
    source: encoder_turn
    direction: left

  - name: brightness_reset
    source: encoder_press_release
    max_duration_ms: 300
