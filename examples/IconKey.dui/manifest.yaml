name: IconKey
type: Key
version: 1
description: Button with Iconify icon and a label below
author: Graphras.com
license: Apache-2.0
category: utilities
layout: layout.svg

bindings:
  icon:
    type: iconify
    node: icon
    size: 55
    default: "ph:placeholder-bold"

  label:
    type: text
    node: label
    default: "Label"
    max_width: 100
  
  background:
    type: color
    node: background
    attribute: color
    default: "#1c1c1c"

  foreground:
    type: color
    node: foreground
    attribute: color
    default: "#dedede"    

spinner:
  type: rotation
  node: spinner
  frames: 8
  interval_ms: 100

events:
  - name: click
    source: key_press_release
    max_duration_ms: 300

  - name: hold
    source: key_hold
    hold_ms: 350

  - name: press
    source: key_press

  - name: release
    source: key_release
