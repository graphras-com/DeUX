name: DashboardCard
type: TouchStripCard
version: 1
description: Deck brightness control, Screen cycler and displays date, time, temperature and humidity
author: Graphras.com
license: Apache-2.0
category: utilities
layout: layout.svg

bindings:
  date:
    type: text
    node: date
    default: ""
    max_width: 190
    overflow: clip

  time:
    type: text
    node: time
    default: ""
    max_width: 190
    overflow: clip

  temperature:
    type: text
    node: temperature
    default: ""
    max_width: 50
    overflow: clip

  humidity:
    type: text
    node: humidity
    default: ""
    max_width: 50
    overflow: clip

  screens:
    type: text
    node: screens
    default: "1/1"
    max_width: 35
    overflow: clip

  deck_brightness:
    type: range
    node: deck_brightness
    default: 0.8
    direction: horizontal

  background:
    type: color
    node: background
    default: "#1C1C1C"

  foreground:
    type: color
    node: foreground
    default: "#DEDEDE"

events:
  - name: brightness_down
    source: encoder_turn
    direction: left
    accumulate: false

  - name: brightness_up
    source: encoder_turn
    direction: right
    accumulate: false

  - name: next_screen
    source: encoder_press_release
    max_duration_ms: 250
