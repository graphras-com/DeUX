<svg id="AudioCard" xmlns="http://www.w3.org/2000/svg" width="197" height="98" font-family="ArialMT,Arial,sans-serif">
    <rect id="background" width="197" height="98" fill="#1c1c1c"/>
    <rect id="cover_placeholder" x="102" y="2" width="93" height="93" rx="4" fill="#333333"/>
    <image id="cover" x="102" y="2" width="93" height="93" href=""/>
