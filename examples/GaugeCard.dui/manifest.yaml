name: GaugeCard
type: TouchStripCard
version: 1
description: Gauge control
author: Graphras.com
license: Apache-2.0
category: utilities
layout: layout.svg

bindings:
  gauge:
    type: transform
    node: needle
    default: 0.8
    transforms:
      - kind: rotate
        from: -50
        to: 50
        origin: 0 0

  min_label:
    type: text
    node: min_label
    default: "-50"
    max_width: 30

  mid_label:
    type: text
    node: mid_label
    default: "0"
    max_width: 30

  max_label:
    type: text
    node: max_label
    default: "+50"
    max_width: 30

  icon:
    type: iconify
    node: icon
    size: 32
    default: "ph:car-battery-light"

events:
  - name: toggle_simulator
    source: encoder_press_release
    max_duration_ms: 300

  - name: value_down
    source: encoder_turn
    direction: left
    accumulate: false

  - name: value_up
    source: encoder_turn
    direction: right
    accumulate: false
