name: GaugeCard
type: TouchStripCard
version: 1
description: Gauge control
author: Graphras.com
license: Apache-2.0
category: utilities
layout: layout.svg

bindings:
  gauge:
    type: transform
    node: needle
    default: 0.8
    transforms:
      - kind: rotate
        from: -50
        to: 50
        origin: 0 0
events:
  - name: value_down
    source: encoder_turn
    direction: left
    accumulate: false

  - name: value_up
    source: encoder_turn
    direction: right
    accumulate: false
