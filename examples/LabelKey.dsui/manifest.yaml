name: LabelKey
type: Key
version: 1
layout: layout.svg

bindings:
  label:
    type: text
    node: text
    default: "Label"
    max_width: 90
    wrap: true
    max_height: 54
    overflow: ellipsis

  indicator_color:
    type: color
    node: indicator
    attribute: fill
    default: "#333333"

events:
  - name: activate
    source: key_press_release
    max_duration_ms: 300

  - name: long_hold
    source: key_hold
    hold_ms: 500
