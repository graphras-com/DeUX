<svg id="VolumeCard" xmlns="http://www.w3.org/2000/svg" width="197" height="98" font-family="ArialMT,Arial,sans-serif">
    <rect id="background" width="197" height="98" fill="#1c1c1c"/>
    <text id="label" x="98" y="40" font-size="14" fill="#dedede" text-anchor="middle">Volume</text>
    <text id="value_text" x="98" y="58" font-size="11" fill="#888888" text-anchor="middle">50%</text>
    <rect id="volume_frame" x="4" y="72" width="189" height="15" stroke="#dedede" fill="none" stroke-width="2" rx="2" ry="2"/>
    <rect id="volume_bar" x="6" y="74" width="185" height="11" stroke="none" fill="#dedede" rx="1" ry="1"/>
</svg>
