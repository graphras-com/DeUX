name: VolumeSlider
type: TouchStripCard
version: 1
layout: layout.svg

bindings:
  label:
    type: text
    node: label
    default: "Volume"

  value_text:
    type: text
    node: value_text
    default: "50%"

  bar_color:
    type: color
    node: volume_bar
    attribute: fill
    default: "#dedede"

  volume:
    type: range
    node: volume_bar
    default: 0.5
    direction: horizontal

events:
  - name: volume_up
    source: encoder_turn
    direction: right

  - name: volume_down
    source: encoder_turn
    direction: left

  - name: mute_toggle
    source: encoder_press_release
    max_duration_ms: 300
