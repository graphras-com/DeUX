# Reusable workflow: Python test suite with coverage
# Called by ci.yml or any other workflow that needs to run tests.

name: Python Test

on:
  workflow_call:
    inputs:
      python-versions:
        description: "JSON array of Python versions to test against"
        required: false
        type: string
        default: '["3.11", "3.12", "3.13"]'
      os:
        description: "Runner OS"
        required: false
        type: string
        default: "ubuntu-latest"
      coverage-threshold:
        description: "Minimum coverage percentage to pass"
        required: false
        type: number
        default: 95

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ${{ inputs.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJson(inputs.python-versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libhidapi-dev

      - name: Install package with test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run tests with coverage
        run: |
          pytest --cov=deckboard --cov-report=term-missing --cov-report=xml --cov-fail-under=${{ inputs.coverage-threshold }}

      - name: Upload coverage report
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14
