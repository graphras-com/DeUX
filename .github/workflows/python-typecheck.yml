name: Reusable Python Type Check

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version for type-checking.
        required: false
        type: string
        default: "3.12"
      install-spec:
        description: Pip install spec, e.g. .[dev,test]
        required: false
        type: string
        default: ".[dev,test]"

jobs:
  mypy:
    name: Mypy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "${{ inputs.install-spec }}"

      - name: Run mypy
        run: python -m mypy src/deux/
