name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  py-lint:
    name: Python Lint
    uses: ./.github/workflows/python-lint.yml
    with:
      python-version: "3.11"

  py-build:
    name: Python Build
    uses: ./.github/workflows/python-ci.yml
    with:
      python-version: "3.11"

  py-typecheck:
    name: Python Type Check
    uses: ./.github/workflows/python-typecheck.yml
    with:
      python-version: "3.11"

  py-test:
    name: Python Test
    uses: ./.github/workflows/python-tests.yml
    with:
      python-versions: '["3.11","3.12","3.13"]'
      coverage-target: "deckui"
      coverage-threshold: 95
      pytest-args: "tests/"

  secrets-scan:
    name: Secrets
    uses: ./.github/workflows/python-gitleaks.yml
    secrets:
      GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  quality-gate:
    name: Quality gate
    if: always()
    needs: [py-lint, py-build, py-typecheck, py-test, secrets-scan]
    runs-on: ubuntu-latest
    steps:
      - name: Check required job results
        env:
          PY_LINT: ${{ needs.py-lint.result }}
          PY_BUILD: ${{ needs.py-build.result }}
          PY_TYPECHECK: ${{ needs.py-typecheck.result }}
          PY_TEST: ${{ needs.py-test.result }}
          SECRETS_SCAN: ${{ needs.secrets-scan.result }}
        run: |
          results=("$PY_LINT" "$PY_BUILD" "$PY_TYPECHECK" "$PY_TEST" "$SECRETS_SCAN")
          for result in "${results[@]}"; do
            if [ "$result" = "failure" ] || [ "$result" = "cancelled" ]; then
              exit 1
            fi
          done

  release:
    name: Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [quality-gate]
    uses: ./.github/workflows/python-release.yml
    permissions:
      contents: write
