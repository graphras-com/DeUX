name: Reusable Release

permissions:
  contents: write

on:
  workflow_call:

jobs:
  release:
    name: Tagged Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
