name: DashboardCard
type: TouchStripCard
version: 1
description: Deck brightness control, Screen cycler and displays date, time
author: Graphras.com
license: Apache-2.0
category: utilities
layout: layout.svg

bindings:
  date:
    type: text
    node: date
    default: ""
    max_width: 190
    overflow: clip

  time:
    type: text
    node: time
    default: ""
    max_width: 190
    overflow: clip

  nav:
    type: list
    node: pager
    child_tag: tspan
    default_items: [Main, Livingroom, Settings]
    default_index: 0
    active_attrs:
      fill: "#DEDEDE"
    inactive_attrs:
      fill: "#8F8F8F"
    separator: " · "

  brightness:
    type: range
    node: brightness
    default: 0.8
    direction: horizontal

events:
  - name: brightness_down
    source: encoder_turn
    direction: left
    accumulate: false

  - name: brightness_up
    source: encoder_turn
    direction: right
    accumulate: false

  - name: next_screen
    source: encoder_press_release
    max_duration_ms: 250
