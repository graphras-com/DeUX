name: IconKey
type: Key
version: 1
description: Button with Iconify icon, label and busy spinner
author: Graphras.com
license: Apache-2.0
category: utilities
layout: layout.svg

bindings:
  icon:
    type: iconify
    node: icon
    size: 55
    default: "ph:placeholder-bold"

  label:
    type: text
    node: label
    default: "Icon Key"
    max_width: 110

  icon_class:
    type: css_class
    node: icon
    default: icon

  background_class:
    type: css_class
    node: background
    default: background-dark

spinner:
  type: rotation
  node: spinner
  frames: 8
  interval_ms: 100
  background_node: spinner_background

events:
  - name: click
    source: key_press_release
    max_duration_ms: 300

  - name: hold
    source: key_hold
    hold_ms: 350

  - name: press
    source: key_press

  - name: release
    source: key_release
